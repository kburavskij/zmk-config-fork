name: Build ZMK firmware
on:
  push:
    branches:
      - main
    paths:
      - 'config/**'
      - '.github/workflows/build.yml'
      - 'build.yaml'
  pull_request:
    paths:
      - 'config/**'
      - '.github/workflows/build.yml'
      - 'build.yaml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      fallback_binary: hex
